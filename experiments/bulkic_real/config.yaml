sampling:
  nwalkers: 8
  nsteps: 3000
  burn_in: 1000
  thin: 5
  progress: true
  parallel: true
  vectorise: false
priors:
  components:
    - type: gaussian
      mean: [0.0, 0.0, 0.0]
      inv_covar:
        - [25.0, 0.0, 0.0]
        - [0.0, 50.0, 0.0]
        - [0.0, 0.0, 50.0]
      indices: [0, 1, 2]
    - type: uniform
      lower_bounds: -180.0
      upper_bounds: 180.0
      indices: [3]
    - type: uniform
      lower_bounds: 0.0
      upper_bounds: 90.0
      indices: [4]
training:
  batch_size: 24
  epochs: 10
  verbose: true
flow:
    flow_type: "RQSpline"
    flow_model_config:
      n_layers: 8
      n_bins: 8
      hidden_size: [64, 64]
      spline_range: [-10.0, 10.0]
    standardize: true
    learning_rate: 0.001
    momentum: 0.9
hypotheses:
  - name: transversely_isotropic
    indices: [4]
    nu: [0.0]
  - name: fully_isotropic
    indices: [1, 2]
    nu: [0.0, 0.0]
